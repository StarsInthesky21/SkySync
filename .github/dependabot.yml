version: 2
updates:
  - package-ecosystem: npm
    directory: /SkySync
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      expo:
        patterns:
          - "expo*"
          - "@expo/*"
      react-native:
        patterns:
          - "react-native*"
          - "@react-native-*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
