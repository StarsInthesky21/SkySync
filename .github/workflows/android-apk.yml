name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: 1
      CI: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build-apk:
    needs: test
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: 1
      CI: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Generate app icons
        run: node scripts/generate-icons.js

      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee ../gradle-build.log

      - name: Publish build log
        if: always()
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest-build-log
          name: Latest Build Log
          make_latest: false
          files: gradle-build.log

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/SkySync.apk

      - name: Publish APK release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest-apk
          name: Latest APK
          make_latest: true
          files: android/app/build/outputs/apk/debug/SkySync.apk
