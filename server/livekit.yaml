port: 7880
bind_addresses:
  - ""
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: true
redis:
  address: redis:6379
# Logging
logging:
  level: info
  json: true
# Room settings
room:
  auto_create: true
  max_participants: 20
  empty_timeout: 300s
  departure_timeout: 20s
# Telemetry (anonymous, opt-in via compose env)
development: false
